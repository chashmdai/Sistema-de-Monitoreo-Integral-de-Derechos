# ==========================================================================
# sgs-service (legado IA) · SGS — Sistema de Gestión y Seguimiento
# Ecosistema SMID (Defensoría de los Derechos de la Niñez)
# --------------------------------------------------------------------------
# DT-2: NINGÚN secreto vive en este archivo. Todo valor sensible o dependiente
# del entorno se externaliza con ${VAR}. Ver .env.example. Las variables sin
# valor por defecto (JWT_SECRET, OPENAI_API_KEY, DB_PASSWORD) son obligatorias.
#
# ESQUEMA: Flyway es dueño del esquema (db/migration/V1__inicial.sql). Hibernate
# solo valida (ddl-auto=validate). En BD vacía, V1 crea las 9 tablas; en una BD
# ya poblada, baseline-on-migrate marca V1 como aplicado sin re-ejecutarlo.
# ==========================================================================
spring.application.name=sgs-service
server.port=${SERVER_PORT:8083}

# ---- Datasource (db_sgs) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_sgs?useUnicode=true&characterEncoding=utf8&serverTimezone=America/Santiago}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Flyway (dueño del esquema) ----
# BD vacía -> crea las tablas con V1. BD ya poblada (sin historial Flyway) ->
# baseline-on-migrate marca V1 como aplicado SIN re-ejecutarlo (conserva datos).
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4

# ---- Multipart (PDFs) ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ---- Seguridad / JWT (HS256 compartido con smid-auth, defensa en profundidad) ----
# El secreto debe coincidir BYTE A BYTE con el JWT_SECRET de smid-auth (6.1).
jwt.secret=${JWT_SECRET}
sgs.roles-claim=${JWT_CLAIM_ROLES:roles}

# ---- Parámetros de dominio SGS ----
sgs.max-candidatas=30
sgs.block-size=5
sgs.min-texto-chars=200
sgs.confianza-umbral=0.60
sgs.alertas.cron=0 0 8 * * *

# ---- OpenAI ----
openai.api-key=${OPENAI_API_KEY}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.model-extraccion=${OPENAI_MODELO_EXTRACCION:gpt-5-mini}
openai.model-evaluacion=${OPENAI_MODELO_EVALUACION:gpt-5.5}
openai.reasoning-effort=high
openai.max-output-tokens=32000
openai.timeout-ms=120000
openai.rubrica-version=Rúbrica DDN v1
openai.cost-prompt-per1k=0.15
openai.cost-completion-per1k=0.60

# ---- MinIO (almacenamiento de expedientes) ----
minio.enabled=${MINIO_ENABLED:true}
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:}
minio.secret-key=${MINIO_SECRET_KEY:}
minio.bucket=${MINIO_BUCKET:sgs-expedientes}

# ---- RabbitMQ (mensajería asíncrona) ----
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ---- Telegram (notificación de alertas, desactivado por defecto) ----
telegram.enabled=${TELEGRAM_ENABLED:false}
telegram.api-base=${TELEGRAM_API_BASE:https://api.telegram.org}
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}

# ---- Resilience4j (Retry sobre OpenAI: 429 y 5xx) ----
resilience4j.retry.instances.openai.max-attempts=4
resilience4j.retry.instances.openai.wait-duration=2s
resilience4j.retry.instances.openai.enable-exponential-backoff=true
resilience4j.retry.instances.openai.exponential-backoff-multiplier=2
resilience4j.retry.instances.openai.retry-exceptions=cl.smid.sgs.exception.GptRateLimitException,cl.smid.sgs.exception.OpenAiException

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized

# ---- Logging ----
logging.level.root=INFO
logging.level.cl.smid.sgs=INFO
