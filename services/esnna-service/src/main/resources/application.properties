# ============================================================================
# esnna-service (legado IA) · Ecosistema SMID — Sistema de Monitoreo Integral
# de Derechos (Defensoría de los Derechos de la Niñez)
# ----------------------------------------------------------------------------
# DT-2: NINGÚN secreto vive en este archivo. Todo valor sensible o dependiente
# del entorno se externaliza con ${VAR}. Ver .env.example. Las variables sin
# valor por defecto (JWT_SECRET, OPENAI_API_KEY, DB_PASSWORD) son obligatorias.
# ============================================================================
spring.application.name=esnna-service
server.port=${SERVER_PORT:8086}

# ---------- Base de datos ----------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_esnna?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago&characterEncoding=utf8}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Hibernate crea/actualiza el esquema (este servicio legado no usa Flyway).
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------- Seguridad / JWT (HS256 compartido con smid-auth, defensa en profundidad) ----------
# El secreto debe coincidir BYTE A BYTE con el JWT_SECRET de smid-auth (6.1).
jwt.secret=${JWT_SECRET}
# Validación opcional de emisor/audiencia (vacío = no se valida).
esnna.security.issuer=${JWT_ISSUER:}
esnna.security.audience=${JWT_AUDIENCE:}
esnna.security.claim-roles=${JWT_CLAIM_ROLES:roles}
esnna.security.rol-operacion=ESNNA_OPERADOR
esnna.security.rol-gestion=ESNNA_GESTOR

# ---------- OpenAI (motor IA) ----------
openai.api.key=${OPENAI_API_KEY}
esnna.openai.modelo-extraccion=${OPENAI_MODELO_EXTRACCION:gpt-4o-mini}
esnna.openai.modelo-consolidacion=${OPENAI_MODELO_CONSOLIDACION:gpt-5.5}
esnna.openai.reasoning-effort=high
esnna.openai.max-tokens-extraccion=12000
esnna.openai.max-tokens-consolidacion=32000
esnna.openai.retry.max-intentos=3
esnna.openai.retry.backoff-segundos=2
esnna.openai.precio.extraccion-input=0.15
esnna.openai.precio.extraccion-output=0.60
esnna.openai.precio.consolidacion-input=1.25
esnna.openai.precio.consolidacion-output=10.00

# ---------- Protocolo / negocio ----------
esnna.protocolo.version=PR-PDR-05 v1 / 26-12-2024
esnna.procesar.max-archivos=30
esnna.pdf.min-chars-utiles=200

# ---------- Borradores ----------
esnna.draft.ttl-minutos=120
esnna.draft.max-entradas=500

# ---------- MinIO (respaldo PDFs, opcional) ----------
esnna.minio.enabled=${MINIO_ENABLED:false}
esnna.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
esnna.minio.access-key=${MINIO_ACCESS_KEY:}
esnna.minio.secret-key=${MINIO_SECRET_KEY:}
esnna.minio.bucket=${MINIO_BUCKET:esnna-documentos}
esnna.documentos.url-validez-minutos=15

# ---------- Uploads ----------
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# ---------- Paginacion ----------
spring.data.web.pageable.max-page-size=100

# ---------- Actuator ----------
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# ---------- Logging ----------
logging.level.cl.smid.esnna=INFO
