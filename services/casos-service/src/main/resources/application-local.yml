## =====================================================================================
## Perfil "local" para desarrollo. Activar con: SPRING_PROFILES_ACTIVE=local
## Aporta conveniencias NO sensibles. Los secretos (DB_PASSWORD, JWT_SECRET) siguen
## inyectándose por entorno: este archivo NO contiene secretos en claro.
## =====================================================================================

spring:
  jpa:
    properties:
      "[hibernate.format_sql]": true
    show-sql: true

  ## Por defecto en local NO se exige broker: el consumo de eventos queda desactivado y la
  ## publicación se registra por log. Para probar mensajería, exportar:
  ##   EVENTOS_CONSUMO=rabbitmq  EVENTOS_TRANSPORTE=rabbitmq  (y levantar RabbitMQ)

smid:
  eventos:
    consumo: ${EVENTOS_CONSUMO:none}
    transporte: ${EVENTOS_TRANSPORTE:log}
  enriquecimiento:
    activo: ${ENRIQUECIMIENTO_ACTIVO:false}
  sedes:
    codigo-defecto: RM
    ## Ejemplo de mapeo alt_key de sede -> código corto (descomentar y ajustar):
    ## codigos:
    ##   "11111111-1111-1111-1111-111111111111": RM
    ##   "22222222-2222-2222-2222-222222222222": VALPO

logging:
  level:
    "[cl.smid.casos]": DEBUG
    "[org.springframework.amqp]": INFO
    "[org.hibernate.SQL]": DEBUG
